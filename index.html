<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEAWNO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  #game-wrap {
    width: 700px;
    max-width: 100vw;
    border: 3px solid #00ff41;
    box-shadow: 0 0 30px #00ff4155, inset 0 0 60px #00110a;
    background: #000d06;
    position: relative;
  }

  /* SCANLINE OVERLAY */
  #game-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 100;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; flex-direction: column; align-items: center; }
  .screen.active { display: flex; }

  /* TITLE SCREEN */
  #title-screen {
    padding: 30px 20px;
    min-height: 420px;
    justify-content: center;
    gap: 20px;
  }

  #title-logo {
    color: #00ff41;
    font-size: 36px;
    letter-spacing: 8px;
    text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff4188;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100% { opacity:1; }
    20%,24%,55% { opacity:0.7; }
  }

  #title-sub {
    color: #00aa2a;
    font-size: 8px;
    letter-spacing: 3px;
    margin-top: -10px;
  }

  #title-cat {
    font-size: 48px;
    margin: 10px 0;
    animation: bounce 1s infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-8px); }
  }

  .menu-btn {
    background: transparent;
    border: 2px solid #00ff41;
    color: #00ff41;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.1s;
    margin: 4px 0;
    min-width: 240px;
    text-align: left;
  }
  .menu-btn:hover, .menu-btn.selected {
    background: #00ff41;
    color: #000;
  }
  .menu-btn::before { content: '> '; }

  #title-hint {
    color: #005515;
    font-size: 7px;
    letter-spacing: 1px;
    margin-top: 10px;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* LEVEL SELECT */
  #level-screen {
    padding: 24px 20px;
    min-height: 420px;
    justify-content: flex-start;
    gap: 10px;
  }

  .screen-title {
    color: #00ff41;
    font-size: 12px;
    letter-spacing: 3px;
    border-bottom: 2px solid #00ff41;
    width: 100%;
    padding-bottom: 8px;
    margin-bottom: 8px;
  }

  .level-card {
    background: transparent;
    border: 1px solid #003310;
    border-left: 3px solid #00ff41;
    color: #00aa2a;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 10px 14px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: all 0.1s;
    line-height: 1.8;
  }
  .level-card:hover {
    background: #001a08;
    color: #00ff41;
    border-color: #00ff41;
  }
  .level-card .lv-num { color: #005515; font-size: 7px; }
  .level-card .lv-name { color: #00ff41; }
  .level-card .lv-desc { color: #007720; font-size: 7px; }
  .level-card.locked { opacity: 0.3; cursor: not-allowed; }
  .level-card.locked:hover { background: transparent; color: #00aa2a; border-color: #003310; }

  /* GAME SCREEN */
  #game-screen {
    min-height: 500px;
  }

  /* HUD */
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 2px solid #00ff41;
    color: #00ff41;
    font-size: 8px;
    gap: 10px;
  }
  #hud-level { color: #00aa2a; }
  #hud-score { color: #00ff41; }
  #hud-lives { letter-spacing: 4px; }

  /* STAGE */
  #stage {
    position: relative;
    width: 100%;
    height: 200px;
    overflow: hidden;
    background: #000d06;
    border-bottom: 2px solid #003310;
  }

  #stage-canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
  }

  /* MELODY DISPLAY */
  #melody-display {
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #003310;
    flex-wrap: wrap;
  }
  #melody-label {
    color: #00aa2a;
    font-size: 7px;
  }
  .note-chip {
    background: #001a08;
    border: 1px solid #00ff41;
    color: #00ff41;
    font-size: 9px;
    padding: 4px 8px;
    min-width: 36px;
    text-align: center;
    transition: all 0.1s;
  }
  .note-chip.current {
    background: #00ff41;
    color: #000;
    box-shadow: 0 0 10px #00ff41;
    transform: scale(1.1);
  }
  .note-chip.done {
    background: #001a08;
    border-color: #003310;
    color: #003310;
  }
  #feedback-msg {
    margin-left: auto;
    font-size: 9px;
    color: #00ff41;
    min-width: 80px;
    text-align: right;
  }
  #feedback-msg.wrong { color: #ff3333; }

  /* OPTIONS BAR */
  #options-bar {
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #003310;
    flex-wrap: wrap;
  }
  .toggle-btn {
    background: transparent;
    border: 1px solid #003a10;
    color: #005515;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .toggle-btn.on {
    border-color: #00ff41;
    color: #00ff41;
    background: #001a08;
  }
  #back-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid #003a10;
    color: #005515;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 4px 8px;
    cursor: pointer;
  }
  #back-btn:hover { border-color: #ff3333; color: #ff3333; }

  /* PIANO */
  #piano-wrap {
    padding: 10px 8px 14px;
    background: #000d06;
    user-select: none;
  }

  #piano {
    display: flex;
    position: relative;
    height: 120px;
    gap: 1px;
  }

  .white-key {
    flex: 1;
    background: #003a10;
    border: 1px solid #00ff41;
    border-top: 2px solid #00ff41;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 4px;
    transition: background 0.05s;
  }
  .white-key:hover { background: #004d15; }
  .white-key.pressed, .white-key.active {
    background: #00ff41;
    border-color: #00aa2a;
  }
  .white-key.correct-flash {
    background: #00ff41;
    box-shadow: 0 0 14px #00ff41;
  }
  .white-key.wrong-flash {
    background: #ff3333;
    border-color: #ff0000;
  }
  .white-key .key-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    color: #00ff41;
    pointer-events: none;
  }
  .white-key.pressed .key-label, .white-key.active .key-label { color: #000; }
  .white-key.correct-flash .key-label { color: #000; }

  .black-key {
    position: absolute;
    width: 9%;
    height: 65%;
    background: #001a08;
    border: 1px solid #00ff41;
    top: 0;
    z-index: 2;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 3px;
    transition: background 0.05s;
  }
  .black-key:hover { background: #002a10; }
  .black-key.pressed, .black-key.active {
    background: #00cc33;
    border-color: #00ff41;
  }
  .black-key.correct-flash {
    background: #00ff41;
    box-shadow: 0 0 10px #00ff41;
  }
  .black-key.wrong-flash {
    background: #ff3333;
    border-color: #ff0000;
  }
  .black-key .key-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 4px;
    color: #00ff41;
    pointer-events: none;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
  }
  .black-key.pressed .key-label, .black-key.active .key-label { color: #000; }

  /* PROGRESS SCREEN */
  #progress-screen {
    padding: 30px 20px;
    min-height: 420px;
    justify-content: center;
    gap: 16px;
    align-items: center;
  }
  #progress-title {
    font-size: 18px;
    color: #00ff41;
    text-shadow: 0 0 20px #00ff41;
    letter-spacing: 4px;
  }
  #progress-cat { font-size: 56px; }
  #progress-msg { color: #00aa2a; font-size: 8px; text-align: center; line-height: 2; }
  #progress-score-big { color: #00ff41; font-size: 22px; }

  /* GAME OVER SCREEN */
  #gameover-screen {
    padding: 30px 20px;
    min-height: 420px;
    justify-content: center;
    gap: 16px;
    align-items: center;
  }
  #gameover-title { font-size: 18px; color: #ff3333; letter-spacing: 3px; }
  #gameover-cat { font-size: 56px; filter: grayscale(1); }
  #gameover-msg { color: #00aa2a; font-size: 8px; text-align: center; line-height: 2; }

</style>
</head>
<body>

<div id="game-wrap">

  <!-- TITLE SCREEN -->
  <div id="title-screen" class="screen active">
    <div id="title-logo">MEAWNO</div>
    <div id="title-sub">THE PIANO CAT GAME</div>
    <div id="title-cat">🐱</div>
    <button class="menu-btn" onclick="showLevelSelect()">PLAY</button>
    <button class="menu-btn" onclick="showHelp()">HOW TO PLAY</button>
    <div id="title-hint">PRESS PLAY TO START</div>
  </div>

  <!-- LEVEL SELECT SCREEN -->
  <div id="level-screen" class="screen">
    <div class="screen-title">SELECT LEVEL</div>
    <div id="level-list"></div>
    <button class="menu-btn" style="margin-top:14px;font-size:8px;" onclick="showTitle()">BACK</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div id="hud">
      <span id="hud-level">LV 1</span>
      <span id="hud-score">SCORE: 0</span>
      <span id="hud-lives">🐾🐾🐾</span>
    </div>
    <div id="stage">
      <canvas id="stage-canvas" width="700" height="200"></canvas>
    </div>
    <div id="melody-display">
      <span id="melody-label">PLAY:</span>
      <div id="note-chips"></div>
      <span id="feedback-msg"></span>
    </div>
    <div id="options-bar">
      <button class="toggle-btn on" id="btn-labels" onclick="toggleLabels()">NOTE LABELS: ON</button>
      <button class="toggle-btn on" id="btn-sound" onclick="toggleSound()">SOUND: ON</button>
      <button id="back-btn" onclick="showLevelSelect()">◄ LEVELS</button>
    </div>
    <div id="piano-wrap">
      <div id="piano"></div>
    </div>
  </div>

  <!-- STAGE CLEAR SCREEN -->
  <div id="progress-screen" class="screen">
    <div id="progress-title">STAGE CLEAR!</div>
    <div id="progress-cat">🐱</div>
    <div id="progress-score-big" id="prog-score">0</div>
    <div id="progress-msg"></div>
    <button class="menu-btn" id="progress-next-btn" onclick="nextLevel()">NEXT LEVEL</button>
    <button class="menu-btn" onclick="showLevelSelect()">LEVEL SELECT</button>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameover-screen" class="screen">
    <div id="gameover-title">GAME OVER</div>
    <div id="gameover-cat">😿</div>
    <div id="gameover-msg"></div>
    <button class="menu-btn" id="retry-btn" onclick="retryLevel()">RETRY</button>
    <button class="menu-btn" onclick="showLevelSelect()">LEVEL SELECT</button>
    <button class="menu-btn" onclick="showTitle()">TITLE</button>
  </div>

</div>

<script>
// ===================== AUDIO ENGINE =====================
let audioCtx = null;
let soundEnabled = true;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const NOTE_FREQS = {
  'C3':130.81,'C#3':138.59,'D3':146.83,'D#3':155.56,'E3':164.81,
  'F3':174.61,'F#3':185.00,'G3':196.00,'G#3':207.65,'A3':220.00,'A#3':233.08,'B3':246.94,
  'C4':261.63,'C#4':277.18,'D4':293.66,'D#4':311.13,'E4':329.63,
  'F4':349.23,'F#4':369.99,'G4':392.00,'G#4':415.30,'A4':440.00,'A#4':466.16,'B4':493.88
};

function playNote(noteName, duration=0.5) {
  if (!soundEnabled) return;
  const ctx = getAudio();
  const freq = NOTE_FREQS[noteName];
  if (!freq) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();

  filter.type = 'lowpass';
  filter.frequency.value = 1800;
  osc.type = 'square';
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(0.18, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + duration);
}

function playChord(notes, duration=0.6) {
  notes.forEach((n,i) => {
    setTimeout(() => playNote(n, duration), i * 30);
  });
}

function playSuccess() {
  if (!soundEnabled) return;
  ['C4','E4','G4','C5'].forEach((n,i) => setTimeout(()=>playNote(n,0.3), i*80));
}

function playWrong() {
  if (!soundEnabled) return;
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 120;
  gain.gain.setValueAtTime(0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.3);
}

function playLevelComplete() {
  if (!soundEnabled) return;
  const melody = ['C4','E4','G4','E4','G4','C5'];
  melody.forEach((n,i) => setTimeout(() => playNote(n,0.25), i*120));
}

function playCatMeow() {
  if (!soundEnabled) return;
  const ctx = getAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.1);
  osc.frequency.exponentialRampToValueAtTime(700, ctx.currentTime + 0.25);
  gain.gain.setValueAtTime(0.12, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.3);
}

// ===================== LEVEL DEFINITIONS =====================
const LEVELS = [
  {
    id: 1, name: "FIRST STEPS", hand: "RIGHT",
    desc: "Single notes, C4-E4",
    sequences: () => makeSequences(1),
    totalNotes: 10
  },
  {
    id: 2, name: "GOING HIGHER", hand: "RIGHT",
    desc: "Single notes, wider range",
    sequences: () => makeSequences(2),
    totalNotes: 12
  },
  {
    id: 3, name: "LEFT PAW", hand: "LEFT",
    desc: "Low notes with left hand",
    sequences: () => makeSequences(3),
    totalNotes: 12
  },
  {
    id: 4, name: "BOTH PAWS", hand: "BOTH",
    desc: "Mix of low and high notes",
    sequences: () => makeSequences(4),
    totalNotes: 14
  },
  {
    id: 5, name: "SPEED CAT", hand: "RIGHT",
    desc: "Faster melodies, right hand",
    sequences: () => makeSequences(5),
    totalNotes: 15
  },
  {
    id: 6, name: "SIMPLE CHORDS", hand: "BOTH",
    desc: "Play
